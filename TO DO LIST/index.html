<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-top">
            <div class="logo-box">✦</div>
            <h1>My Tasks</h1>
        </div>
        <p class="subtitle">Stay focused. Get things done.</p>
    </div>

    <div class="stats-bar">
        <div class="stat">
            <span class="stat-number" id="stat-total">0</span>
            <span class="stat-label">Total</span>
        </div>
        <div class="stat active-stat">
            <span class="stat-number" id="stat-active">0</span>
            <span class="stat-label">Active</span>
        </div>
        <div class="stat done-stat">
            <span class="stat-number" id="stat-done">0</span>
            <span class="stat-label">Done</span>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <span class="input-icon">+</span>
            <input type="text" id="task-input" placeholder="Add a new task...">
        </div>
        <button id="add-btn">Add</button>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="task-list"></ul>

    <div class="footer">
        <span class="tasks-left" id="tasks-left"></span>
        <button class="clear-btn" id="clear-btn">Clear completed</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
